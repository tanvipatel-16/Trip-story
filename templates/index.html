<!DOCTYPE html>
<html>
<head>
    <title>Trip Story AI</title>

    <style>
        body {
            font-family: Arial;
            background: #0f0f0f;
            color: white;
            text-align: center;
            margin-top: 50px;
        }

        .card {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            margin: auto;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        input {
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #ff4d6d;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        video {
            width: 100%;
            margin-top: 15px;
            display: none;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🎬 Trip Story Generator</h2>

    <form id="form">
        <input type="file" name="images" multiple required>
        <br>
        <button type="submit">Create Story</button>
    </form>

    <p id="status"></p>

    <video id="video" controls></video>
</div>

<script>
document.getElementById("form").onsubmit = async (e) => {
    e.preventDefault();

    let formData = new FormData(e.target);
    document.getElementById("status").innerText = "Generating...";

    let res = await fetch("/generate", {
        method: "POST",
        body: formData
    });

    if (!res.ok) {
        document.getElementById("status").innerText = "Error generating video";
        return;
    }

    let blob = await res.blob();
    let url = URL.createObjectURL(blob);

    let video = document.getElementById("video");
    video.src = url;
    video.style.display = "block";

    document.getElementById("status").innerText = "Done!";
};
</script>

</body>
</html>
